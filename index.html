<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Paraca 1.1</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #141414;
  font-family: Arial, sans-serif;
}

#game {
  position: relative;
  width: 100vw;
  height: 100vh;
  background: linear-gradient(#2d3e2f, #1b241d);
  overflow: hidden;
}

#title {
  position: absolute;
  top: 12px;
  left: 12px;
  color: #ffe033;
  font-size: 28px;
  font-weight: 900;
  z-index: 10;
}

#player {
  position: absolute;
  width: 32px;
  height: 32px;
  background-image: url("3536007bf41649b984f91dfbe3ea46e6-d9hrf29-sheet.png");
  background-repeat: no-repeat;
  image-rendering: pixelated;
  transform: scale(2);
  transform-origin: top left;
  left: 140px;
  top: 180px;
  z-index: 5;
}

.bullet {
  position: absolute;
  width: 8px;
  height: 4px;
  background: #ffe033;
  border-radius: 4px;
  z-index: 4;
}

.enemy {
  position: absolute;
  width: 32px;
  height: 32px;
  background-image: url("3536007bf41649b984f91dfbe3ea46e6-d9hrf29-sheet.png");
  background-repeat: no-repeat;
  image-rendering: pixelated;
  transform: scale(2);
  transform-origin: top left;
  z-index: 4;
}

#controls {
  position: absolute;
  bottom: 25px;
  left: 20px;
  width: 150px;
  height: 150px;
  z-index: 20;
}

.btn {
  position: absolute;
  width: 48px;
  height: 48px;
  border-radius: 12px;
  background: rgba(255,255,255,0.18);
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  font-weight: bold;
  border: 1px solid rgba(255,255,255,0.35);
}

#up { left: 51px; top: 0; }
#down { left: 51px; bottom: 0; }
#left { left: 0; top: 51px; }
#right { right: 0; top: 51px; }

#shoot {
  position: absolute;
  bottom: 55px;
  right: 35px;
  width: 82px;
  height: 82px;
  border-radius: 50%;
  background: rgba(255, 224, 51, 0.85);
  color: #111;
  font-size: 32px;
  font-weight: 900;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 20;
  border: 3px solid rgba(255,255,255,0.6);
}

#info {
  position: absolute;
  top: 50px;
  left: 12px;
  color: white;
  font-size: 15px;
  z-index: 10;
}
</style>
</head>

<body>

<div id="game">
  <div id="title">PARACA 1.1</div>
  <div id="info">Muoviti e spara</div>

  <div id="player"></div>

  <div id="controls">
    <div class="btn" id="up">▲</div>
    <div class="btn" id="down">▼</div>
    <div class="btn" id="left">◀</div>
    <div class="btn" id="right">▶</div>
  </div>

  <div id="shoot">⚡</div>
</div>

<script>
const game = document.getElementById("game");
const player = document.getElementById("player");

const FRAME_W = 32;
const FRAME_H = 32;
const SCALE = 2;

let playerX = 140;
let playerY = 180;

let frame = 0;
let row = 1;
let direction = "right";
let moving = false;

let keys = {
  up: false,
  down: false,
  left: false,
  right: false
};

let bullets = [];
let enemies = [];

function setSprite(el, frameX, frameY) {
  el.style.backgroundPosition = `-${frameX * FRAME_W}px -${frameY * FRAME_H}px`;
}

function updatePlayerSprite() {
  if (direction === "right") row = 1;
  if (direction === "left") row = 1;
  if (direction === "down") row = 0;
  if (direction === "up") row = 2;

  setSprite(player, frame, row);

  if (direction === "left") {
    player.style.transform = `scale(${-SCALE}, ${SCALE})`;
    player.style.transformOrigin = "top left";
  } else {
    player.style.transform = `scale(${SCALE})`;
    player.style.transformOrigin = "top left";
  }
}

function movePlayer() {
  moving = false;

  if (keys.up) {
    playerY -= 3;
    direction = "up";
    moving = true;
  }

  if (keys.down) {
    playerY += 3;
    direction = "down";
    moving = true;
  }

  if (keys.left) {
    playerX -= 3;
    direction = "left";
    moving = true;
  }

  if (keys.right) {
    playerX += 3;
    direction = "right";
    moving = true;
  }

  playerX = Math.max(0, Math.min(window.innerWidth - 64, playerX));
  playerY = Math.max(0, Math.min(window.innerHeight - 64, playerY));

  player.style.left = playerX + "px";
  player.style.top = playerY + "px";
}

setInterval(() => {
  if (moving) {
    frame++;
    if (frame > 9) frame = 0;
  } else {
    frame = 0;
  }

  updatePlayerSprite();
}, 110);

function shoot() {
  const b = document.createElement("div");
  b.className = "bullet";

  let bx = playerX + 32;
  let by = playerY + 28;
  let vx = 0;
  let vy = 0;

  if (direction === "right") vx = 8;
  if (direction === "left") vx = -8;
  if (direction === "up") vy = -8;
  if (direction === "down") vy = 8;

  b.style.left = bx + "px";
  b.style.top = by + "px";

  game.appendChild(b);

  bullets.push({
    el: b,
    x: bx,
    y: by,
    vx,
    vy
  });
}

function spawnEnemy() {
  const e = document.createElement("div");
  e.className = "enemy";

  let ex = window.innerWidth - 100;
  let ey = Math.random() * (window.innerHeight - 120) + 40;

  e.style.left = ex + "px";
  e.style.top = ey + "px";

  setSprite(e, 0, 1);

  game.appendChild(e);

  enemies.push({
    el: e,
    x: ex,
    y: ey,
    frame: 0
  });
}

setInterval(spawnEnemy, 1800);

function updateEnemies() {
  enemies.forEach(enemy => {
    if (enemy.x > playerX) enemy.x -= 1.2;
    if (enemy.x < playerX) enemy.x += 1.2;
    if (enemy.y > playerY) enemy.y -= 1.2;
    if (enemy.y < playerY) enemy.y += 1.2;

    enemy.el.style.left = enemy.x + "px";
    enemy.el.style.top = enemy.y + "px";
  });
}

function updateBullets() {
  bullets.forEach((b, bi) => {
    b.x += b.vx;
    b.y += b.vy;

    b.el.style.left = b.x + "px";
    b.el.style.top = b.y + "px";

    if (
      b.x < -20 ||
      b.x > window.innerWidth + 20 ||
      b.y < -20 ||
      b.y > window.innerHeight + 20
    ) {
      b.el.remove();
      bullets.splice(bi, 1);
    }

    enemies.forEach((enemy, ei) => {
      const hit =
        b.x < enemy.x + 64 &&
        b.x + 8 > enemy.x &&
        b.y < enemy.y + 64 &&
        b.y + 4 > enemy.y;

      if (hit) {
        b.el.remove();
        enemy.el.remove();
        bullets.splice(bi, 1);
        enemies.splice(ei, 1);
      }
    });
  });
}

function gameLoop() {
  movePlayer();
  updateEnemies();
  updateBullets();
  requestAnimationFrame(gameLoop);
}

gameLoop();

document.addEventListener("keydown", e => {
  if (e.key === "ArrowUp" || e.key === "w") keys.up = true;
  if (e.key === "ArrowDown" || e.key === "s") keys.down = true;
  if (e.key === "ArrowLeft" || e.key === "a") keys.left = true;
  if (e.key === "ArrowRight" || e.key === "d") keys.right = true;
  if (e.key === " ") shoot();
});

document.addEventListener("keyup", e => {
  if (e.key === "ArrowUp" || e.key === "w") keys.up = false;
  if (e.key === "ArrowDown" || e.key === "s") keys.down = false;
  if (e.key === "ArrowLeft" || e.key === "a") keys.left = false;
  if (e.key === "ArrowRight" || e.key === "d") keys.right = false;
});

function bindButton(id, keyName) {
  const btn = document.getElementById(id);

  btn.addEventListener("touchstart", e => {
    e.preventDefault();
    keys[keyName] = true;
  });

  btn.addEventListener("touchend", e => {
    e.preventDefault();
    keys[keyName] = false;
  });

  btn.addEventListener("mousedown", () => keys[keyName] = true);
  btn.addEventListener("mouseup", () => keys[keyName] = false);
}

bindButton("up", "up");
bindButton("down", "down");
bindButton("left", "left");
bindButton("right", "right");

document.getElementById("shoot").addEventListener("touchstart", e => {
  e.preventDefault();
  shoot();
});

document.getElementById("shoot").addEventListener("mousedown", shoot);

updatePlayerSprite();
</script>

</body>
</html>
